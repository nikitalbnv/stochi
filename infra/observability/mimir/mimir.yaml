target: all
multitenancy_enabled: false

server:
  http_listen_port: 9009
  grpc_listen_port: 9095

common:
  storage:
    backend: filesystem
    filesystem:
      dir: /data/mimir/common

blocks_storage:
  backend: filesystem
  filesystem:
    dir: /data/mimir/blocks
  tsdb:
    dir: /data/mimir/tsdb

compactor:
  data_dir: /data/mimir/compactor

distributor:
  ring:
    kvstore:
      store: inmemory

ingester:
  ring:
    replication_factor: 1
    kvstore:
      store: inmemory

ruler_storage:
  backend: filesystem
  filesystem:
    dir: /data/mimir/ruler

alertmanager_storage:
  backend: filesystem
  filesystem:
    dir: /data/mimir/alertmanager

store_gateway:
  sharding_ring:
    replication_factor: 1

limits:
  ingestion_rate: 100000
  ingestion_burst_size: 200000
